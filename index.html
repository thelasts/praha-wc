<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Moje mapa</title>
    <style>
        html, body { padding: 0; margin: 0; height: 100%; width: 100%; font-family: sans-serif, Arial; }
        #viewDiv { height: calc(100% - 50px); width: 100%; }
        #controls { padding: 10px; background: white; border-bottom: 1px solid #ddd; }
        select { padding: 5px; margin-right: 10px; }
    </style>

    <link rel="stylesheet" href="https://js.arcgis.com/5.0/dijit/themes/light/Dijit.css">
    <link rel="stylesheet" href="https://js.arcgis.com/5.0/esri/themes/light/main.css">
    <script type="module" src="https://js.arcgis.com/5.0/"></script>
    <script type="module">
        const [Map, MapView, VectorTileLayer, WMTSLayer, Extent,
            Slider, Legend, Expand, LayerList, Home, Print, Search] = await $arcgis.import([
            "@arcgis/core/Map.js",
            "@arcgis/core/views/MapView.js",
            "@arcgis/core/layers/VectorTileLayer.js",
            "@arcgis/core/layers/WMTSLayer.js",
            "@arcgis/core/geometry/Extent.js",
            "@arcgis/core/widgets/Slider.js",
            "@arcgis/core/widgets/Legend.js",
            "@arcgis/core/widgets/Expand.js",
            "@arcgis/core/widgets/LayerList.js",
            "@arcgis/core/widgets/smartMapping/OpacitySlider.js",
            "@arcgis/core/widgets/Home.js",
            "@arcgis/core/widgets/Print.js",
            "@arcgis/core/widgets/Search.js"
        ]);
        const serviceUrl = "https://tiles.arcgis.com/tiles/SBTXIEUGWbqzUecw/arcgis/rest/services/zakladni_mapa/VectorTileServer";
        const styleUrls = {
            bw: "https://iprpraha.maps.arcgis.com/sharing/rest/content/items/c06609b3412d45eb8bda2fd24d3371a8/resources/styles/root.json",
            color: "https://iprpraha.maps.arcgis.com/sharing/rest/content/items/50f872ac3f85435baf86c2443b247af7/resources/styles/root.json",
            dark: "https://iprpraha.maps.arcgis.com/sharing/rest/content/items/63edd325a9f94897bf10f8a23b7950d7/resources/styles/root.json"
        };
        const basemapLayer = new VectorTileLayer({
            url: serviceUrl
        });

        const hillshadeLayer = new WMTSLayer({
            url: "https://gs-pub.praha.eu/imgs/rest/services/map/dsm_hls/ImageServer/WMTS?",
            activeLayer: {
                id: "dsm_hls"
            },
            blendMode: "multiply",
            opacity: 0.6
        });

        hillshadeLayer.title = "Digitální stínovaný model (DSM)";

        const ortoLayer = new WMTSLayer({
            url: "https://gs-pub.praha.eu/imgs/rest/services/ort/letecke_snimkovani/ImageServer/WMTS?",
            visible: false
        })

        const map = new Map({
            layers: [basemapLayer, ortoLayer, hillshadeLayer],
            spatialReference: { wkid: 102067 }
        });

        const view = new MapView({
            container: `viewDiv`,
            map: map,
            center: [-723810, -1055158],
            extent: new Extent({
                xmin: -878528.7537314763, ymin: -1154488.7545631744,
                xmax: -569093.2698605085, ymax: -956827.4642405937,
                spatialReference: { wkid: 102067 }
            }),
            zoom: 9,
        });
        const layerList = new LayerList({
            view: view,
            listItemCreatedFunction: (event) => {
                const {layer, item} = event;

                // Disable default visibility toggle for base layer
                if (layer === basemapLayer) {
                    item.actionsSections = [];
                }
                // Add a calcite slider for updating opacity on group layers.
                if (item.layer !== basemapLayer) {
                    const label = document.createElement("calcite-label");
                    label.title = "Layer Opacity";
                    label.scale = "s";

                    const slider = document.createElement("calcite-slider");
                    slider.labelHandles = true;
                    slider.labelTicks = true;
                    slider.min = 0;
                    slider.minLabel = "0";
                    slider.max = 1;
                    slider.maxLabel = "1";
                    slider.scale = "s";
                    slider.step = 0.01;
                    slider.value = item.layer.opacity ? item.layer.opacity : 1;
                    slider.ticks = 0.5;

                    slider.addEventListener("calciteSliderChange", () => {
                        item.layer.opacity = slider.value;
                    });

                    label.appendChild(slider);

                    item.panel = {
                        content: label,
                        icon: "sliders-horizontal",
                        title: "Change layer opacity"
                    };
                }
            }
        });

        // UI widgets
        const layerListExpand = new Expand({
            content: layerList,
            view: view,
            expanded: false
        });

        // TODO populate legend
        let legend = new Legend({
            view: view
        });

        let legendExpand = new Expand({
            content: legend,
            view,
            expanded: false,
        });

        let homeWidget = new Home({
            view: view,
            viewpoint: view.center
        });

        let printWidget = new Print({
            expanded: false
        });

        let searchWidget = new Search({
            view: view,
            className: "esri-search"
        });

        // UI Layout
        view.ui.add(layerListExpand, "bottom-left");
        view.ui.add(legendExpand, "top-right");

        // view.ui.add(searchWidget, "top-trailing");
        view.ui.add(homeWidget, "top-left");
        view.ui.add(printWidget, "top-left");

        // Style selector
        basemapLayer.loadStyle(styleUrls.bw);
        document.getElementById("styleSelect").addEventListener("change", (e) => {
            basemapLayer.loadStyle(styleUrls[e.target.value]);
        });
    //     Search listener
    //     document.getElementsByClassName("esri-search")[0].addEventListener("search-complete", (e) => {
    //         view.goTo(e.results[0].feature.geometry);
    //     });

    </script>


</head>
<body>
<div id="viewDiv"></div>

<div id="controls">
    <div id="style-widget">
        <div class="esri-widget__heading">Base Style</div>
        <select class="esri-select" id="styleSelect">
            <option value="bw" selected>BW</option>
            <option value="color">Color</option>
            <option value="dark">Dark</option>
        </select>
    </div>
</div>
</body>
</html>

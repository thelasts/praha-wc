<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Zakladni Mapa App</title>
    <style>
        html, body, #viewDiv { padding: 0; margin: 0; height: 100%; width: 100%; }
    </style>
    <link rel="stylesheet" href="https://js.arcgis.com/4.32/esri/themes/light/main.css">
    <script src="https://js.arcgis.com/4.32/"></script>
</head>
<body>
<div id="controls">
    <label for="styleSelect">Style: </label>
    <select id="styleSelect">
        <option value="bw">BW (Default)</option>
        <option value="color">Color</option>
        <option value="dark">Dark</option>
    </select>
</div>
<div id="viewDiv"></div>
<script>
    require([
        "esri/Map",
        "esri/views/MapView",
        "esri/layers/VectorTileLayer",
        "esri/geometry/Extent",
        "dojo/dom",
        "dojo/on",
    ], function(Map, MapView, VectorTileLayer, Extent, dom, on) {
        const serviceUrl = "https://tiles.arcgis.com/tiles/SBTXIEUGWbqzUecw/arcgis/rest/services/zakladni_mapa/VectorTileServer";

        const styleUrls = {
            bw: "https://iprpraha.maps.arcgis.com/sharing/rest/content/items/c06609b3412d45eb8bda2fd24d3371a8/resources/styles/root.json",
            color: "https://iprpraha.maps.arcgis.com/sharing/rest/content/items/50f872ac3f85435baf86c2443b247af7/resources/styles/root.json",
            dark: "https://iprpraha.maps.arcgis.com/sharing/rest/content/items/63edd325a9f94897bf10f8a23b7950d7/resources/styles/root.json"
        };

        const basemapLayer = new VectorTileLayer({
            url: serviceUrl  // Auto-loads tiles/styles from service JSON
        });

        const map = new Map({
            layers: [basemapLayer],
            spatialReference: {
                wkid: 102067  // S-JTSK / Krovak (latestWkid: 5514)
            }
        });

        const view = new MapView({
            container: "viewDiv",
            map: map,
            extent: new Extent({  // initialExtent
                xmin: -878528.7537314763,
                ymin: -1154488.7545631744,
                xmax: -569093.2698605085,
                ymax: -956827.4642405937,
                spatialReference: { wkid: 102067 }
            }),
            scale: 914400  // LOD 1
        });
        // Default style
        basemapLayer.loadStyle(styleUrls.bw);
        // Style switcher
        on(dom.byId("styleSelect"), "change", function() {
            const selectedStyle = styleUrls[this.value];
            basemapLayer.loadStyle(selectedStyle);  // Reloads layer with new style
        });

    });

</script>
</body>
</html>
